name: Daily System Design Tweet

on:
  schedule:
    # 9:00 AM IST = 03:30 UTC (cron: minute hour dom month dow)
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: post-tweet
  cancel-in-progress: false

jobs:
  tweet:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
      X_CONSUMER_KEY:        ${{ secrets.X_CONSUMER_KEY }}
      X_CONSUMER_SECRET:     ${{ secrets.X_CONSUMER_SECRET }}
      X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify required secrets are present
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for var in OPENAI_API_KEY X_CONSUMER_KEY X_CONSUMER_SECRET X_ACCESS_TOKEN X_ACCESS_TOKEN_SECRET; do
            if [ -z "${!var:-}" ]; then
              missing+=("$var")
            fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "::error::Set them under: Settings → Secrets and variables → Actions → Repository secrets"
            exit 1
          fi
          echo "All 5 secrets present."

      - name: Post tweet
        shell: bash
        run: |
          set -euo pipefail
          python bot.py
