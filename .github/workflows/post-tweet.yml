name: Daily AI Tweet
on:
  schedule:
    - cron: '30 3 * * *'   # 9 AM IST (3:30 AM UTC)
  workflow_dispatch:       # Manual trigger from Actions tab
jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env
          echo "X_BEARER_TOKEN=${{ secrets.X_BEARER_TOKEN }}" >> .env
          echo "X_CONSUMER_KEY=${{ secrets.X_CONSUMER_KEY }}" >> .env
          echo "X_CONSUMER_SECRET=${{ secrets.X_CONSUMER_SECRET }}" >> .env
          echo "X_ACCESS_TOKEN=${{ secrets.X_ACCESS_TOKEN }}" >> .env
          echo "X_ACCESS_TOKEN_SECRET=${{ secrets.X_ACCESS_TOKEN_SECRET }}" >> .env
          python bot.py
